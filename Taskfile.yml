version: "3"

tasks:
  server:
    desc: Start FastAPI control plane (http://127.0.0.1:8000)
    dir: "{{.ROOT_DIR}}"
    env:
      LOREGARDEN_REPO_ROOT: "{{.ROOT_DIR}}"
    cmds:
      - ./scripts/dev-server.sh
    interactive: true

  claude:setup-token:
    desc: >-
      Generate a long-lived Claude OAuth token so the Usage modal works around
      the macOS Keychain restriction (one-time; token is valid ~1 year)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - |
        set -euo pipefail
        echo "Running 'claude setup-token' — complete the OAuth flow in your browser."
        echo "It will print a token at the end; copy it (just the token, nothing else)."
        echo
        claude setup-token
        echo
        printf 'Paste the token here: '
        read -r CLAUDE_OAUTH_TOKEN
        mkdir -p data
        printf '%s' "$CLAUDE_OAUTH_TOKEN" > data/.claude-oauth-token
        chmod 600 data/.claude-oauth-token
        echo "Saved to data/.claude-oauth-token — the server loads it automatically from now on."
    interactive: true

  client:
    desc: Start React IDE dev server (http://localhost:5173)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - ./scripts/dev-client.sh
    interactive: true

  dev:
    desc: Start client and server together
    deps:
      - server
      - client

  tauri:dev:
    desc: Launch the desktop app in dev mode (starts Vite + FastAPI automatically)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - npm run tauri:dev
    interactive: true

  tauri:build:
    desc: Build the packaged desktop app (backend sidecar + bundled installer)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - npm run tauri:build

  self-improve:watch:
    desc: >-
      Poll for human-triage tickets and reload the server once agent streams
      and other workflows have finished
    dir: "{{.ROOT_DIR}}"
    env:
      LOREGARDEN_API_URL: "http://127.0.0.1:8000"
      LOREGARDEN_WORKSPACE: "loregarden"
    cmds:
      - ./scripts/self-improve-restart-watch.sh
    interactive: true

  self-improve:dev:
    desc: Start client, server, and self-improve restart watcher together
    deps:
      - server
      - client
      - self-improve:watch

  hooks:install:
    desc: Install lefthook git hooks (pre-commit, pre-push) for this repo
    dir: "{{.ROOT_DIR}}"
    cmds:
      - lefthook install

  hooks:server:
    desc: Run pre-push server hook (ruff + pytest, mirrors CI) on demand
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash .lefthook/scripts/server-tests.sh

  hooks:client:
    desc: Run pre-push client hook (oxlint + tsc + jest, mirrors CI) on demand
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash .lefthook/scripts/client-tests.sh

  hooks:py-review:
    desc: Ruff check for staged Python (server/pyproject.toml)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash .lefthook/scripts/py-review.sh {{.CLI_ARGS}}

  hooks:py-pylint:
    desc: Pylint too-many-statements for staged Python (server/pyproject.toml)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash .lefthook/scripts/py-pylint.sh {{.CLI_ARGS}}

  hooks:py-organization:
    desc: Python organization guardrails for staged files
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash .lefthook/scripts/server_python.sh .lefthook/scripts/py_organization_check.py {{.CLI_ARGS}}

  hooks:client-lint:
    desc: oxlint for staged client files
    dir: "{{.ROOT_DIR}}"
    cmds:
      - bash .lefthook/scripts/client-lint.sh {{.CLI_ARGS}}
