version: "3"

tasks:
  server:
    desc: Start FastAPI control plane (http://127.0.0.1:8000)
    dir: "{{.ROOT_DIR}}"
    env:
      LOREGARDEN_REPO_ROOT: "{{.ROOT_DIR}}"
    cmds:
      - ./scripts/dev-server.sh
    interactive: true

  client:
    desc: Start React IDE dev server (http://localhost:5173)
    dir: "{{.ROOT_DIR}}"
    cmds:
      - ./scripts/dev-client.sh
    interactive: true

  dev:
    desc: Start client and server together
    deps:
      - server
      - client

  self-improve:watch:
    desc: >-
      Poll for human-triage tickets and reload the server once agent streams
      and other workflows have finished
    dir: "{{.ROOT_DIR}}"
    env:
      LOREGARDEN_API_URL: "http://127.0.0.1:8000"
      LOREGARDEN_WORKSPACE: "loregarden"
    cmds:
      - ./scripts/self-improve-restart-watch.sh
    interactive: true

  self-improve:dev:
    desc: Start client, server, and self-improve restart watcher together
    deps:
      - server
      - client
      - self-improve:watch
