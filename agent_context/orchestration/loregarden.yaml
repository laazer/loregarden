slug: loregarden
name: Loregarden Builtin Autopilot
driver: builtin_autopilot
workflow_template: loregarden-tdd
orchestrator:
  skill: autopilot
  pipeline: agents/common_assets/pipeline_stages_v1.md
gates:
  enabled: true
  # Static-analysis gate: each check is paired with a fixer of the same name in
  # autofix_commands below, so a failure the fixer can resolve never reaches a
  # human. Commands run from the workspace root via `bash -c` so they find the
  # per-subproject tooling (uv-managed venv for server/, node_modules for client/).
  commands:
    - bash -c "cd server && uv run ruff check ."
    - bash -c "cd server && uv run ruff format --check ."
    - bash -c "cd client && npx oxlint ."
  autofix_commands:
    - bash -c "cd server && uv run ruff check --fix ."
    - bash -c "cd server && uv run ruff format ."
    - bash -c "cd client && npx oxlint --fix ."
  autofix_agent_fallback: true
  # Every gate here is static analysis whose mechanical fixer (ruff --fix /
  # oxlint --fix) already ran best-effort before an agent is ever spawned. What
  # the fixer cannot auto-resolve is almost always a real code issue a single
  # agent pass either fixes or can't — a second full agent respawn rarely
  # converts a still-failing lint gate and just re-pays a whole CLI run's usage,
  # so cap it at one.
  autofix_max_agent_attempts: 1
subagents:
  spawn_via: cli
callbacks:
  mode: api
max_stages_per_run: 0
